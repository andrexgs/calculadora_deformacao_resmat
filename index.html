<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora ResMat</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --purple: #4f46e5;
      --green: #16a34a;
      --result-bg: #111827;
      --result: #22c55e;
      --warn-bg: #fffbeb;
      --warn-border: #fde68a;
      --warn-text: #92400e;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .title {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .status {
      color: white;
      text-align: center;
      font-weight: 700;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 18px;
      background: var(--purple);
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .field label {
      font-weight: 700;
      margin-bottom: 6px;
      display: block;
    }

    .input-with-unit {
      display: flex;
      gap: 8px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .unit-badge {
      padding: 12px;
      background: #eef2ff;
      border-radius: 12px;
      font-weight: bold;
    }

    .result {
      margin-top: 20px;
      background: var(--result-bg);
      border-radius: 16px;
      padding: 22px;
      text-align: center;
    }

    .result-value {
      color: var(--result);
      font-size: 2rem;
      font-weight: 800;
    }
  </style>
</head>
<body>

<main class="wrap">
  <h1 class="title">Calculadora ResMat</h1>
  <p class="subtitle">δ = P·L / (E·A)</p>

  <section class="card">
    <div id="status" class="status"></div>

    <div class="grid">
      <div class="field">
        <label>Carga P</label>
        <div class="input-with-unit">
          <input id="p" value="10k">
          <span id="unitP" class="unit-badge"></span>
        </div>
      </div>

      <div class="field">
        <label>Módulo E</label>
        <div class="input-with-unit">
          <input id="e" value="210G">
          <span class="unit-badge">Pa</span>
        </div>
      </div>

      <div class="field">
        <label>Comprimento L</label>
        <div class="input-with-unit">
          <input id="l" value="150">
          <span id="unitL" class="unit-badge"></span>
        </div>
      </div>

      <div class="field">
        <label>Área A</label>
        <div class="input-with-unit">
          <input id="a" value="25">
          <span id="unitA" class="unit-badge"></span>
        </div>
      </div>
    </div>

    <div class="result">
      <div id="result" class="result-value">...</div>
    </div>
  </section>
</main>

<script>
const PREFIX = {
  k: 1e3, M: 1e6, G: 1e9,
  m: 1e-3, u: 1e-6, μ: 1e-6
};

const els = {
  p: document.getElementById('p'),
  e: document.getElementById('e'),
  l: document.getElementById('l'),
  a: document.getElementById('a'),
  unitP: document.getElementById('unitP'),
  unitL: document.getElementById('unitL'),
  unitA: document.getElementById('unitA'),
  status: document.getElementById('status'),
  result: document.getElementById('result')
};

function parse(input) {
  const match = input.replace(',', '.').match(/^([\d.]+)([a-zA-Zμ]*)$/);
  if (!match) return NaN;

  let value = parseFloat(match[1]);
  const prefix = match[2];

  if (PREFIX[prefix]) value *= PREFIX[prefix];

  return { value, prefix };
}

function detectSystem(prefix) {
  return prefix === 'k' ? 'cm' : 'mm';
}

function updateUI(system) {
  const isMm = system === 'mm';

  els.unitP.textContent = isMm ? 'N' : 'kN';
  els.unitL.textContent = isMm ? 'mm' : 'cm';
  els.unitA.textContent = isMm ? 'mm²' : 'cm²';

  els.status.textContent = isMm
    ? 'Sistema: mm / mm² / N'
    : 'Sistema: cm / cm² / kN';
}

function calculate() {
  const p = parse(els.p.value);
  const e = parse(els.e.value);
  const l = parseFloat(els.l.value);
  const a = parseFloat(els.a.value);

  if (!p || !e || !l || !a) return;

  const system = detectSystem(p.prefix);
  updateUI(system);

  const L = system === 'mm' ? l * 1e-3 : l * 1e-2;
  const A = system === 'mm' ? a * 1e-6 : a * 1e-4;

  const delta = (p.value * L) / (e.value * A);

  els.result.textContent = (delta * 1000).toFixed(6) + ' mm';
}

document.querySelectorAll('input').forEach(i =>
  i.addEventListener('input', calculate)
);

calculate();
</script>

</body>
</html>
